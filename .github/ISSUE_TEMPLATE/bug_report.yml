name: Bug report
description: Report something that is broken or behaving incorrectly.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Fill in the sections below so it can be reproduced quickly.
        Workflow conventions (branches, PRs, migrations) live in `docs/git-workflow.md`.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, one-paragraph description of the bug.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Polaris is affected?
      options:
        - frontend
        - backend-api
        - voyage (task loop)
        - literature / wiki
        - writer
        - review
        - skills
        - infra / deploy
        - docs
        - other / not sure
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps that trigger the bug.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
      description: What you expected to happen, and what actually happened.
    validations:
      required: true
  - type: dropdown
    id: env
    attributes:
      label: Environment
      description: Where did you hit this?
      options:
        - Local dev (docker compose)
        - Production (zju-54)
        - Both
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Relevant console/server logs or screenshots. Paste text logs in a code block.
    validations:
      required: false
