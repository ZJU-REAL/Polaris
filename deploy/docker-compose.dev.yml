# 开发覆盖：热重载、源码挂载、前端用 vite dev server
# 用法: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.dev.yml up --build
#
# 预览目录 DEV_SRC（默认仓库根 ..）：想在不污染 main 的前提下预览某分支，
# 用一个专用 dev worktree（git worktree add ../wt/dev origin/main）、在里面
# git checkout 目标分支，再用 `DEV_SRC=../wt/dev docker compose ... up` 起栈。
# 见 docs/git-workflow.md「本地预览」。
services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ${DEV_SRC:-..}/backend:/srv/backend
      - appdata:/srv/data

  worker:
    # 注意：arq --watch 只重载 settings 模块，app/ 下已导入模块不会刷新；
    # 改了 worker 侧代码后需 `docker compose restart worker` 才真正生效
    command: arq worker.settings.WorkerSettings --watch .
    volumes:
      - ${DEV_SRC:-..}/backend:/srv/backend
      - appdata:/srv/data

  frontend:
    # 注意：colima/虚拟机挂载下 vite 可能收不到文件变更事件而服务旧代码；
    # 页面内容与源码不一致时 `docker compose restart frontend`
    # 注意：package.json 新增依赖后必须 `up -d --build --force-recreate
    # --renew-anon-volumes frontend`——node_modules 是匿名卷，普通 recreate 会复用旧卷
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      target: build                 # 只用 node 阶段
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_PROXY_TARGET: http://api:8000
    volumes:
      - ${DEV_SRC:-..}/frontend:/srv/frontend
      - /srv/frontend/node_modules  # 容器内自己的 node_modules
    ports:
      - "5173:5173"
