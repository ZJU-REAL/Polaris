<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  给 Noto CJK 追加 Windows/macOS 中文字体的家族名，让按名字请求这些字体的模板
  （如 zjuthesis 的 \setCJKmainfont{FangSong}/{SimSun}/{SimHei}/{KaiTi}…）在 Linux 上
  也能解析到已安装的 Noto CJK。装进 /etc/fonts/conf.d/ 后需 fc-cache -f 生效。
  注：tectonic 用自带字体缓存、不读这些别名；中文模板请用 xelatex 引擎编译。
-->
<fontconfig>
  <match target="scan">
    <test name="family"><string>Noto Serif CJK SC</string></test>
    <edit name="family" mode="append">
      <string>SimSun</string><string>NSimSun</string><string>STSong</string>
      <string>Songti SC</string><string>FangSong</string><string>FangSong_GB2312</string>
      <string>STFangsong</string><string>KaiTi</string><string>KaiTi_GB2312</string>
      <string>STKaiti</string><string>Kaiti SC</string>
    </edit>
  </match>
  <match target="scan">
    <test name="family"><string>Noto Sans CJK SC</string></test>
    <edit name="family" mode="append">
      <string>SimHei</string><string>STHeiti</string><string>Heiti SC</string>
      <string>Microsoft YaHei</string>
    </edit>
  </match>
</fontconfig>
