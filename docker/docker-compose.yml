name: polaris

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-polaris}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    # image 兼作构建 tag 与拉取来源：`build` 时打成此名，`docker compose pull` 时从此拉。
    image: ${POLARIS_IMAGE_PREFIX:-tricktreat}/polaris-api:${POLARIS_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    env_file: ../.env
    environment:
      POLARIS_DATA_DIR: /srv/data   # PDF/产物写挂载卷，勿写进代码树（会触发 --watch 重载）
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - appdata:/srv/data          # PDF / 编译产物等
      - tectonic-cache:/root/.cache/Tectonic   # tectonic 宏包缓存（首次编译联网下载）

  worker:
    image: ${POLARIS_IMAGE_PREFIX:-tricktreat}/polaris-worker:${POLARIS_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    env_file: ../.env
    environment:
      POLARIS_DATA_DIR: /srv/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - appdata:/srv/data
      - tectonic-cache:/root/.cache/Tectonic   # tectonic 宏包缓存（与 api 共享）

  frontend:
    image: ${POLARIS_IMAGE_PREFIX:-tricktreat}/polaris-frontend:${POLARIS_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pgdata:
  redisdata:
  appdata:
  tectonic-cache:
